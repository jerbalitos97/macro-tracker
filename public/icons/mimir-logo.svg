<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- iOS-style rounded square background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>

  <!-- Horizon: surface of the well, fading at both ends -->
  <defs>
    <linearGradient id="horizon" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0"    stop-color="#d4b85a" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#d4b85a" stop-opacity="0.55"/>
      <stop offset="0.50" stop-color="#d4b85a" stop-opacity="0.95"/>
      <stop offset="0.82" stop-color="#d4b85a" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#d4b85a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#d4b85a" stop-opacity="0.55"/>
      <stop offset="0.6"  stop-color="#d4b85a" stop-opacity="0.10"/>
      <stop offset="1"    stop-color="#d4b85a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft glow behind the core for depth -->
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- Horizon line -->
  <rect x="40" y="252" width="432" height="8" rx="4" fill="url(#horizon)"/>

  <!-- Outer ring (the well opening) -->
  <circle cx="256" cy="256" r="116" fill="none" stroke="#d4b85a" stroke-width="6"/>

  <!-- Three orbital ticks at 30°, 150°, 270° -->
  <line x1="377.24" y1="326.00" x2="391.10" y2="334.00" stroke="#a08938" stroke-width="5" stroke-linecap="round"/>
  <line x1="134.76" y1="326.00" x2="120.90" y2="334.00" stroke="#a08938" stroke-width="5" stroke-linecap="round"/>
  <line x1="256.00" y1="116.00" x2="256.00" y2="100.00" stroke="#a08938" stroke-width="5" stroke-linecap="round"/>

  <!-- Core: the oracle eye / Odin's eye at the bottom of the well -->
  <circle cx="256" cy="256" r="42" fill="#d4b85a"/>
  <circle cx="256" cy="256" r="14" fill="#0a0a0a"/>
</svg>